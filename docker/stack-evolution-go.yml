version: "3.7"

services:

## --------------------------- ORION --------------------------- ##

  evolution_go:
    image: ghcr.io/kiryuureno/evolution-go:latest ## Ou evoapicloud/evolution-go:latest
    
    volumes:
      - evolution_go_instances:/app/dbdata
      - evolution_go_logs:/app/logs

    networks:
      - PetSoftNet ## Nome da rede interna compartilhada com Postgres, Chatwoot, N8N, etc.

    environment:
    ## ⚙️ Configurações Gerais
      - SERVER_PORT=8080
      - CLIENT_NAME=SetupOrion
      - GLOBAL_API_KEY=ab3576658c849ec4a6354d466f1a0577
      - CONNECT_ON_STARTUP=true
      - LANGUAGE=pt-BR
      - TZ=America/Sao_Paulo

    ## 🗄️ Configuração do Banco de Dados (PostgreSQL)
      ## Certifique-se de ter criado os bancos 'evogo_auth' e 'evogo_users' no seu Postgres
      - POSTGRES_AUTH_DB=postgresql://postgres:19dd7b730f9dd8a558ceb1d94dce7e8b@postgres:5432/evogo_auth?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://postgres:19dd7b730f9dd8a558ceb1d94dce7e8b@postgres:5432/evogo_users?sslmode=disable
      - DATABASE_SAVE_MESSAGES=true

    ## 🧊 Logs e Debug
      - WADEBUG=INFO
      - LOGTYPE=console
      - LOG_DIRECTORY=/app/logs
      - LOG_MAX_SIZE=100
      - LOG_MAX_BACKUPS=5
      - LOG_MAX_AGE=30
      - LOG_COMPRESS=true

    ## ⚙️ Configurações de Eventos
      - EVENT_IGNORE_GROUP=false
      - EVENT_IGNORE_STATUS=true
      - WEBHOOKFILES=true

    ## 🗣️ Integração com Chatwoot (Nativa no EvolutionGO)
      ## Pode ser ativada por instância via API ou painel
      - CHATWOOT_ENABLED=true

    ## ☁️ Configuração de S3 / MinIO (Opcional)
      - MINIO_ENABLED=false
      #- MINIO_ENDPOINT=minio-s3.medvet.net.br
      #- MINIO_ACCESS_KEY=SUA_ACCESS_KEY
      #- MINIO_SECRET_KEY=SUA_SECRET_KEY
      #- MINIO_BUCKET=evolution
      #- MINIO_USE_SSL=true

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.evolution_go.rule=Host(`evoapi.medvet.net.br`) ## Altere para o seu domínio (ex: evoapi.sopet.app)
        - traefik.http.routers.evolution_go.entrypoints=websecure
        - traefik.http.routers.evolution_go.priority=1
        - traefik.http.routers.evolution_go.tls.certresolver=letsencryptresolver
        - traefik.http.routers.evolution_go.service=evolution_go
        - traefik.http.services.evolution_go.loadbalancer.server.port=8080
        - traefik.http.services.evolution_go.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.evolution_go.middlewares=sslheader

## --------------------------- ORION --------------------------- ##

volumes:
  evolution_go_instances:
    external: true
    name: evolution_go_instances
  evolution_go_logs:
    external: true
    name: evolution_go_logs

networks:
  PetSoftNet: ## Nome da rede interna
    external: true
    name: PetSoftNet
